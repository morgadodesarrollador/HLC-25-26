apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-{{ .Values.app.name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.app.ingress.certManager.clusterIssuer }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: {{ .Values.app.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.app.ingress.host }}
      secretName: {{ .Values.app.ingress.tls.secretName }}
  rules:
    - host: {{ .Values.app.ingress.host }}
      http:
        paths:
          - path: {{ .Values.app.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: service-{{ .Values.app.name }}
                port:
                  number: {{ .Values.app.container.port }}

